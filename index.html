<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>My wallet</title>
    <link
      rel="shortcut icon"
      href="./favicon/favicon.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="notification hidden"></div>

    <div class="container">
      <p class="count"></p>

      <div class="analitics"></div>

      <input
        type="text"
        class="input"
        id="sum"
        autocomplete="off"
        inputmode="numeric"
        pattern="[0-9]*"
      />

      <div class="btn-box">
        <button class="btn btn__in">Пополнить</button>
        <button class="btn btn__out">Снять</button>
      </div>

      <ul class="history"></ul>

      <button class="btn btn__clear">Сбросить</button>
    </div>
  </body>
</html>
